[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "pkg-config", "python3", "cairo", "pango", "libjpeg", "giflib", "librsvg", "pixman"]

[phases.install]
cmds = [
  # Root dependencies - try with optional deps first, fallback without
  "npm ci --prefer-offline --no-audit --no-fund --omit=dev || npm ci --prefer-offline --no-audit --no-fund --omit=dev --omit=optional",
  # API dependencies
  "cd api && npm ci --prefer-offline --no-audit --no-fund --omit=dev",
  # Frontend dependencies (build-time only)
  "cd frontend && npm ci --prefer-offline --no-audit --no-fund"
]

[phases.build]
cmds = [
  # Build frontend with production optimizations
  "cd frontend && NODE_ENV=production npm run build",
  # Clean up frontend node_modules after build to save space
  "rm -rf frontend/node_modules"
]

[start]
cmd = "NODE_ENV=production node api/server.js"
